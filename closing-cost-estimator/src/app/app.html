<div class="min-h-screen bg-gray-50 text-gray-800">
  <header class="bg-blue-800 text-white py-4 px-6 shadow-md">
    <div class="flex items-start justify-between flex-wrap gap-3">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">PA Buyer's Closing Cost Estimator</h1>
        <p class="text-blue-200 text-sm mt-1">Good Faith Estimate of Settlement Charges</p>
      </div>
      <nav class="flex items-center gap-6 pt-1">
        <a routerLink="/" [routerLinkActiveOptions]="{exact:true}" routerLinkActive="underline font-semibold"
          class="text-blue-200 hover:text-white text-sm transition-colors">Calculator</a>
        <a routerLink="/disclaimers" routerLinkActive="underline font-semibold"
          class="text-blue-200 hover:text-white text-sm transition-colors">Disclaimers &amp; Limitations</a>
      </nav>
    </div>
  </header>
  <router-outlet />
</div>
